name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore Astro build cache
        id: astro-cache
        uses: actions/cache/restore@v4
        with:
          path: ./node_modules/.astro
          key: astro-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            astro-${{ runner.os }}-

      - name: Build with Astro
        run: npm run build

      - name: Save Astro build cache
        if: steps.astro-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ./node_modules/.astro
          key: astro-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 
